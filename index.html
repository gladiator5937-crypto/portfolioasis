<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Builder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid #2a2a44;
        }

        h1 {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #8888aa;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .profile-card {
            background: #12121f;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid #2a2a44;
            text-align: center;
        }

        .profile-name {
            color: #ffffff;
            font-size: 32px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .verified-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #1d9bf0;
            color: white;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 30px;
            letter-spacing: 0.3px;
            animation: popIn 0.4s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .profile-title {
            color: #aab;
            font-size: 16px;
            margin-top: 8px;
        }

        .profile-bio {
            color: #7788aa;
            font-size: 14px;
            margin-top: 12px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            color: #ccccee;
            font-size: 13px;
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: #0f0f1f;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            color: #eee;
            font-size: 15px;
            transition: border 0.3s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1d9bf0;
            box-shadow: 0 0 0 3px rgba(29, 155, 240, 0.15);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .secret-section {
            background: #121222;
            border-radius: 12px;
            padding: 20px;
            border: 1px dashed #3a3a5a;
            margin-top: 5px;
        }

        .secret-section .label-sm {
            color: #8899bb;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .code-input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .code-input-row input {
            flex: 1;
            padding: 10px 14px;
            background: #0a0a18;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #eee;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        .code-input-row input:focus {
            outline: none;
            border-color: #1d9bf0;
        }

        .code-input-row button {
            padding: 10px 22px;
            background: #1d9bf0;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .code-input-row button:hover {
            background: #1a8cdb;
            transform: scale(1.02);
        }

        .code-input-row button:active {
            transform: scale(0.97);
        }

        .code-message {
            margin-top: 10px;
            font-size: 13px;
            font-weight: 500;
        }

        .code-message.success {
            color: #4ade80;
        }

        .code-message.error {
            color: #f87171;
        }

        .code-message.info {
            color: #60a5fa;
        }

        .save-btn {
            width: 100%;
            padding: 14px;
            background: #1d9bf0;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
        }

        .save-btn:hover {
            background: #1a8cdb;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(29, 155, 240, 0.25);
        }

        .save-btn:active {
            transform: translateY(0);
        }

        .save-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .footer {
            margin-top: 25px;
            color: #445;
            font-size: 12px;
            text-align: center;
            border-top: 1px solid #1a1a30;
            padding-top: 20px;
        }

        .footer code {
            background: #0a0a18;
            padding: 2px 10px;
            border-radius: 6px;
            color: #6af;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        @media (max-width: 500px) {
            .container {
                padding: 20px;
            }
            .profile-name {
                font-size: 24px;
            }
            .code-input-row {
                flex-wrap: wrap;
            }
            .code-input-row button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>⚡ Portfolio Builder</h1>
        <p class="subtitle">Build your profile & unlock the verified badge</p>

        <div class="profile-card" id="profileCard">
            <div class="profile-name" id="displayName">
                Your Name
                <span id="badgeContainer"></span>
            </div>
            <div class="profile-title" id="displayTitle">Web Developer</div>
            <div class="profile-bio" id="displayBio">
                Building cool stuff on the internet.
            </div>
        </div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="nameInput" placeholder="e.g. Alex Rivera" />
        </div>

        <div class="form-group">
            <label>Title</label>
            <input type="text" id="titleInput" placeholder="e.g. Full-Stack Developer" />
        </div>

        <div class="form-group">
            <label>Bio</label>
            <textarea id="bioInput" placeholder="Tell the world about yourself..."></textarea>
        </div>

        <div class="secret-section">
            <div class="label-sm">🔑 Unlock Verified Badge</div>
            <div class="code-input-row">
                <input type="text" id="codeInput" placeholder="Enter secret code" maxlength="20" />
                <button id="verifyBtn">Verify</button>
            </div>
            <div id="codeMessage" class="code-message info">
                🔑 Enter the secret code to unlock your verified badge
            </div>
        </div>

        <button class="save-btn" id="saveBtn">💾 Save Portfolio</button>

        <div class="footer">
            🔒 Secret code: <code>VERIFY2026</code>
        </div>

    </div>

    <script>
        // ============================================================
        // THE ONE AND ONLY SECRET CODE
        // ============================================================
        const SECRET_CODE = "VERIFY2026";

        let isVerified = false;

        const nameInput = document.getElementById('nameInput');
        const titleInput = document.getElementById('titleInput');
        const bioInput = document.getElementById('bioInput');
        const displayName = document.getElementById('displayName');
        const displayTitle = document.getElementById('displayTitle');
        const displayBio = document.getElementById('displayBio');
        const badgeContainer = document.getElementById('badgeContainer');
        const codeInput = document.getElementById('codeInput');
        const verifyBtn = document.getElementById('verifyBtn');
        const codeMessage = document.getElementById('codeMessage');
        const saveBtn = document.getElementById('saveBtn');

        function updateProfile() {
            const name = nameInput.value.trim() || 'Your Name';
            const title = titleInput.value.trim() || 'Web Developer';
            const bio = bioInput.value.trim() || 'Building cool stuff on the internet.';

            displayName.innerHTML = `${name} ${isVerified ? '<span class="verified-badge">✅ Verified</span>' : ''}`;
            displayTitle.textContent = title;
            displayBio.textContent = bio;
        }

        function verifyCode() {
            const entered = codeInput.value.trim();

            if (!entered) {
                codeMessage.className = 'code-message info';
                codeMessage.innerHTML = '🔑 Enter the secret code to unlock your verified badge';
                return;
            }

            if (entered === SECRET_CODE) {
                isVerified = true;
                codeMessage.className = 'code-message success';
                codeMessage.innerHTML = '✅ Verified! Your badge has been unlocked. 🎉';
                updateProfile();
            } else {
                isVerified = false;
                codeMessage.className = 'code-message error';
                codeMessage.innerHTML = '❌ Invalid code. Try again.';
                updateProfile();
            }
        }

        function savePortfolio() {
            saveBtn.textContent = '💾 Saving...';
            saveBtn.disabled = true;

            setTimeout(() => {
                const data = {
                    name: nameInput.value.trim(),
                    title: titleInput.value.trim(),
                    bio: bioInput.value.trim(),
                    verified: isVerified,
                    codeUsed: codeInput.value.trim()
                };
                localStorage.setItem('portfolioData', JSON.stringify(data));

                saveBtn.textContent = '✅ Saved!';
                saveBtn.style.background = '#4ade80';
                saveBtn.style.color = '#0f0f1a';

                setTimeout(() => {
                    saveBtn.textContent = '💾 Save Portfolio';
                    saveBtn.style.background = '#1d9bf0';
                    saveBtn.style.color = 'white';
                    saveBtn.disabled = false;
                }, 1500);

                alert('🎉 Portfolio saved successfully!\n\n' +
                    `Name: ${data.name || 'Not set'}\n` +
                    `Title: ${data.title || 'Not set'}\n` +
                    `Verified: ${data.verified ? '✅ Yes' : '❌ No'}`);
            }, 800);
        }

        function loadSavedData() {
            const saved = localStorage.getItem('portfolioData');
            if (!saved) return;

            try {
                const data = JSON.parse(saved);
                nameInput.value = data.name || '';
                titleInput.value = data.title || '';
                bioInput.value = data.bio || '';
                if (data.verified) {
                    isVerified = true;
                    codeInput.value = data.codeUsed || '';
                    codeMessage.className = 'code-message success';
                    codeMessage.innerHTML = '✅ Previously verified! Badge restored. 🎉';
                }
                updateProfile();
            } catch (e) {
                // ignore
            }
        }

        nameInput.addEventListener('input', updateProfile);
        titleInput.addEventListener('input', updateProfile);
        bioInput.addEventListener('input', updateProfile);
        verifyBtn.addEventListener('click', verifyCode);

        codeInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                verifyCode();
            }
        });

        saveBtn.addEventListener('click', savePortfolio);

        loadSavedData();
        updateProfile();

        console.log('🚀 Portfolio loaded!');
        console.log('🔑 Secret code:', SECRET_CODE);
    </script>

</body>
</html>
